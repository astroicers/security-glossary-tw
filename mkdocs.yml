site_name: 資安術語庫 Security Glossary TW
site_url: https://glossary.astroicers.link/
site_description: 繁體中文資安術語標準化詞彙庫
site_author: Astroicers

repo_name: astroicers/security-glossary-tw
repo_url: https://github.com/astroicers/security-glossary-tw

theme:
  name: material
  custom_dir: docs/overrides
  language: zh-TW
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切換深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切換淺色模式
  features:
    - search.highlight
    - search.suggest
    - search.share
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-]+'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/astroicers/security-glossary-tw
  generator: false

nav:
  - 首頁: index.md
  - 術語庫:
      - 總覽: glossary/index.md
      - ⚔️ 攻擊類型: glossary/attack_types.md
      - ⚖️ 法規合規: glossary/compliance.md
      - 📋 框架標準: glossary/frameworks.md
      - 🦠 惡意程式: glossary/malware.md
      - 🛡️ 技術名詞: glossary/technologies.md
      - 👤 威脅行為者: glossary/threat_actors.md
      - 🔓 漏洞類型: glossary/vulnerabilities.md
  - 🏷️ 標籤瀏覽: tags/index.md
  - 📰 資安週報: weekly/index.md
  - API 文件: api.md
